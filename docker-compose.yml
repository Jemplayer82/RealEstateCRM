services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # MongoDB only accessible within Docker network — no external port exposure

  python-service:
    build: ./python-service
    container_name: realestatecrm-python-1
    restart: unless-stopped
    networks:
      - default

  server:
    build: ./server
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      DB_URL: mongodb://mongo:27017
      DB: RealEstateCRM
      NODE_ENV: production
    depends_on:
      - mongo
      - python-service

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_STRIPE_PUBLIC_KEY: ""
    depends_on:
      - server

volumes:
  mongo_data:
